<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MB Portal — Login</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--brand:#f97316;--dark:#0f172a;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--error:#ef4444}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);
    font-family:'Segoe UI',system-ui,sans-serif;position:relative;overflow:hidden;
  }
  body::before{
    content:'';position:absolute;inset:0;
    background-image:radial-gradient(circle at 1px 1px,rgba(249,115,22,.18) 1px,transparent 0);
    background-size:36px 36px;animation:bgshift 25s linear infinite;
  }
  body::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 60% 40%,rgba(249,115,22,.08) 0%,transparent 60%);
    pointer-events:none;
  }
  @keyframes bgshift{0%{transform:translate(0,0)}100%{transform:translate(36px,36px)}}

  .card{
    background:rgba(255,255,255,.98);border-radius:24px;padding:48px 44px 40px;
    width:100%;max-width:420px;position:relative;z-index:1;
    box-shadow:0 32px 80px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.1);
    animation:slideUp .4s ease;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .logo{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .logo-icon{
    width:46px;height:46px;border-radius:12px;
    background:linear-gradient(135deg,var(--brand),#ef4444);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:900;color:#fff;
    box-shadow:0 6px 16px rgba(249,115,22,.45);
    flex-shrink:0;
  }
  .logo-text{font-size:24px;font-weight:800;color:var(--dark);letter-spacing:-.3px}
  .logo-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-top:1px}

  .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:22px 0}

  .welcome{margin-bottom:28px}
  .welcome h2{font-size:19px;font-weight:700;color:var(--text);margin-bottom:5px}
  .welcome p{font-size:13px;color:var(--muted);line-height:1.5}

  .field{margin-bottom:18px}
  label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:.2px}
  .input-wrap{position:relative}
  .input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
  input{
    width:100%;border:1.5px solid var(--border);border-radius:11px;
    padding:12px 14px 12px 40px;font-size:14px;color:var(--text);outline:none;
    transition:.2s;background:#fafafa;
  }
  input:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(249,115,22,.12)}
  input::placeholder{color:#b0b8c4}
  .eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:15px;color:var(--muted);transition:.15s;user-select:none}
  .eye:hover{color:var(--brand)}

  .err{
    background:#fef2f2;border:1px solid #fecaca;border-radius:10px;
    padding:11px 15px;font-size:13px;color:var(--error);margin-bottom:16px;
    display:none;align-items:center;gap:8px;
  }
  .err.show{display:flex}

  .btn{
    width:100%;padding:14px;border:none;border-radius:11px;cursor:pointer;
    font-size:15px;font-weight:700;transition:.2s;margin-top:6px;
    background:linear-gradient(135deg,var(--brand) 0%,#ef4444 100%);color:#fff;
    box-shadow:0 5px 18px rgba(249,115,22,.42);letter-spacing:.2px;
  }
  .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(249,115,22,.5)}
  .btn:active:not(:disabled){transform:translateY(0)}
  .btn:disabled{opacity:.65;cursor:not-allowed;transform:none}

  .footer{text-align:center;font-size:12px;color:var(--muted);margin-top:22px;line-height:1.6}
  .footer span{color:var(--brand);font-weight:600}

  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.35);
    border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* Caps lock warning */
  .caps-warn{font-size:11px;color:#d97706;margin-top:5px;display:none}
  .caps-warn.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">MB</div>
    <div>
      <div class="logo-text">MB Portal</div>
      <div class="logo-sub">Dashboard Hub</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="welcome">
    <h2>Welcome back 👋</h2>
    <p>Sign in to access your dashboards and reports</p>
  </div>

  <div class="err" id="err">⚠️ <span id="errMsg"></span></div>

  <div class="field">
    <label for="email">Email Address</label>
    <div class="input-wrap">
      <span class="input-icon">📧</span>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
  </div>

  <div class="field">
    <label for="pass">Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password"/>
      <span class="eye" id="eyeBtn" onclick="togglePass()">👁️</span>
    </div>
    <div class="caps-warn" id="capsWarn">⚠️ Caps Lock is ON</div>
  </div>

  <button class="btn" id="btn" onclick="login()">Sign In →</button>

  <div class="footer">
    Trouble signing in? Contact your <span>administrator</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://xsxchyqhhyfvuxbofxna.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzeGNoeXFoaHlmdnV4Ym9meG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTMzNTAsImV4cCI6MjA5Njk4OTM1MH0.P4VYTv-fizFW7nknhP4h1BetBGJ6yLLD90lkUUYgt-4';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// Already logged in? Redirect
sb.auth.getSession().then(({data})=>{
  if(data.session) window.location.href='portal.html';
});

async function login(){
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('btn');
  hideErr();
  if(!email||!pass){showErr('Email aur password zaroori hain');return;}
  if(!email.includes('@')){showErr('Valid email address daalo');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>Signing in...';
  const {error} = await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    let msg='Invalid email or password.';
    if(error.message.includes('Email not confirmed')) msg='Please verify your email first.';
    if(error.message.includes('network')||error.message.includes('fetch')) msg='Network error. Check your connection.';
    if(error.message.includes('rate')) msg='Too many attempts. Please wait a moment.';
    showErr(msg);
    btn.disabled=false;
    btn.innerHTML='Sign In →';
    document.getElementById('pass').focus();
  } else {
    btn.innerHTML='✓ Success! Redirecting...';
    window.location.href='portal.html';
  }
}

function showErr(msg){
  document.getElementById('errMsg').textContent=msg;
  document.getElementById('err').classList.add('show');
}
function hideErr(){
  document.getElementById('err').classList.remove('show');
}

// Toggle password visibility
function togglePass(){
  const p=document.getElementById('pass');
  const eye=document.getElementById('eyeBtn');
  if(p.type==='password'){p.type='text';eye.textContent='🙈';}
  else{p.type='password';eye.textContent='👁️';}
}

// ✅ Enter key — kahi bhi press karo, login ho jayega
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    login();
  }
});

// Caps Lock warning
document.getElementById('pass').addEventListener('keyup', e=>{
  const capsOn = e.getModifierState && e.getModifierState('CapsLock');
  document.getElementById('capsWarn').classList.toggle('show', capsOn);
});

// Input pe focus aate hi error hide karo
document.getElementById('email').addEventListener('input', hideErr);
document.getElementById('pass').addEventListener('input', hideErr);

// Auto focus email on load
window.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('email').focus();
});
</script>
</body>
</html>
