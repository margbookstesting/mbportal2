<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Margbooks Dashboard Portal — Login</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--brand:#0d9488;--brand2:#0891b2;--dark:#0f172a;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--error:#ef4444}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#f1f5f9;
    font-family:'Segoe UI',system-ui,sans-serif;position:relative;overflow:hidden;
  }
  body::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,#0d9488 0%,#0891b2 100%);
    opacity:.06;pointer-events:none;
  }
  body::after{
    content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,#0d9488,#0891b2);
  }

  .card{
    background:#ffffff;border-radius:20px;padding:48px 44px 44px;
    width:100%;max-width:420px;position:relative;z-index:1;
    box-shadow:0 4px 6px rgba(0,0,0,.05),0 20px 60px rgba(13,148,136,.1),0 0 0 1px rgba(13,148,136,.08);
    animation:slideUp .35s ease;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  .logo{display:flex;align-items:center;gap:14px;margin-bottom:10px}
  .logo-icon{
    width:50px;height:50px;border-radius:14px;
    background:linear-gradient(135deg,#0d9488,#0891b2);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:900;color:#fff;
    box-shadow:0 6px 20px rgba(13,148,136,.35);flex-shrink:0;
  }
  .logo-text{font-size:22px;font-weight:800;color:var(--dark);letter-spacing:-.3px}
  .logo-sub{font-size:11px;color:var(--brand);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;font-weight:600}

  .divider{height:1px;background:var(--border);margin:22px 0}

  .welcome{margin-bottom:28px}
  .welcome h2{font-size:20px;font-weight:700;color:var(--dark);margin-bottom:6px}
  .welcome p{font-size:13px;color:var(--muted);line-height:1.5}

  .field{margin-bottom:18px}
  label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:7px;letter-spacing:.3px;text-transform:uppercase}
  .input-wrap{position:relative}
  .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:.6}
  input{
    width:100%;border:1.5px solid #e2e8f0;border-radius:10px;
    padding:13px 14px 13px 42px;font-size:14px;color:var(--text);outline:none;
    transition:.2s;background:#f8fafc;
  }
  input:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(13,148,136,.1)}
  input::placeholder{color:#cbd5e1}
  .eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:15px;color:#94a3b8;transition:.15s;user-select:none}
  .eye:hover{color:var(--brand)}

  .err{
    background:#fef2f2;border:1px solid #fecaca;border-radius:10px;
    padding:11px 15px;font-size:13px;color:var(--error);margin-bottom:16px;
    display:none;align-items:center;gap:8px;
  }
  .err.show{display:flex}

  .btn{
    width:100%;padding:14px;border:none;border-radius:10px;cursor:pointer;
    font-size:15px;font-weight:700;transition:.2s;margin-top:4px;
    background:linear-gradient(135deg,#0d9488,#0891b2);color:#fff;
    box-shadow:0 4px 16px rgba(13,148,136,.35);letter-spacing:.3px;
  }
  .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,148,136,.45)}
  .btn:active:not(:disabled){transform:translateY(0)}
  .btn:disabled{opacity:.65;cursor:not-allowed;transform:none}

  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.35);
    border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .caps-warn{font-size:11px;color:#d97706;margin-top:6px;display:none;font-weight:500}
  .caps-warn.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">MB</div>
    <div>
      <div class="logo-text">Margbooks</div>
      <div class="logo-sub">Dashboard Portal</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="welcome">
    <h2>Welcome back 👋</h2>
    <p>Sign in to access your dashboards and reports</p>
  </div>

  <div class="err" id="err">⚠️ <span id="errMsg"></span></div>

  <div class="field">
    <label for="email">Email Address</label>
    <div class="input-wrap">
      <span class="input-icon">📧</span>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
  </div>

  <div class="field">
    <label for="pass">Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password"/>
      <span class="eye" id="eyeBtn" onclick="togglePass()">👁️</span>
    </div>
    <div class="caps-warn" id="capsWarn">⚠️ Caps Lock is ON</div>
  </div>

  <button class="btn" id="btn" onclick="login()">Sign In →</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://xsxchyqhhyfvuxbofxna.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzeGNoeXFoaHlmdnV4Ym9meG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTMzNTAsImV4cCI6MjA5Njk4OTM1MH0.P4VYTv-fizFW7nknhP4h1BetBGJ6yLLD90lkUUYgt-4';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: { persistSession: true, storage: window.sessionStorage }
});

sb.auth.getSession().then(({data})=>{
  if(data.session) window.location.href='portal.html';
});

async function login(){
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('btn');
  hideErr();
  if(!email||!pass){showErr('Email aur password zaroori hain');return;}
  if(!email.includes('@')){showErr('Valid email address daalo');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>Signing in...';
  const {error} = await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    let msg='Invalid email or password.';
    if(error.message.includes('Email not confirmed')) msg='Please verify your email first.';
    if(error.message.includes('network')||error.message.includes('fetch')) msg='Network error. Check your connection.';
    if(error.message.includes('rate')) msg='Too many attempts. Please wait a moment.';
    showErr(msg);
    btn.disabled=false;
    btn.innerHTML='Sign In →';
    document.getElementById('pass').focus();
  } else {
    btn.innerHTML='✓ Success! Redirecting...';
    window.location.href='portal.html';
  }
}

function showErr(msg){ document.getElementById('errMsg').textContent=msg; document.getElementById('err').classList.add('show'); }
function hideErr(){ document.getElementById('err').classList.remove('show'); }
function togglePass(){
  const p=document.getElementById('pass');
  const eye=document.getElementById('eyeBtn');
  if(p.type==='password'){p.type='text';eye.textContent='🙈';}
  else{p.type='password';eye.textContent='👁️';}
}
// Enter in email -> password par focus; Enter in password -> sign in
document.getElementById('email').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); document.getElementById('pass').focus(); }
});
document.getElementById('pass').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); login(); }
});
document.getElementById('pass').addEventListener('keydown', e=>{
  if(e.getModifierState)
    document.getElementById('capsWarn').classList.toggle('show', e.getModifierState('CapsLock'));
});
document.getElementById('pass').addEventListener('blur', ()=>{
  document.getElementById('capsWarn').classList.remove('show');
});
document.getElementById('email').addEventListener('input', hideErr);
document.getElementById('pass').addEventListener('input', hideErr);
window.addEventListener('DOMContentLoaded', ()=>{ document.getElementById('email').focus(); });
</script>
</body>
</html>
