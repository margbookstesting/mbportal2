<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Margbooks Dashboard Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --brand:#0d9488;--brand2:#0891b2;--brand-g:linear-gradient(135deg,#0d9488,#0891b2);
  --dark:#08101e;--text:#1e293b;--muted:#64748b;--muted2:#94a3b8;
  --border:#e2e8f0;--bg:#f0f4f8;--surface:#fff;
  --danger:#e11d48;--danger-l:#fef2f2;--danger-m:#fecaca;
  --sh-s:0 1px 3px rgba(0,0,0,.07);--sh-m:0 4px 16px rgba(0,0,0,.1);
}
html,body{height:100%;overflow:hidden;font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* ── NAV ── */
nav{
  height:50px;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 32px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:var(--sh-s);position:relative;z-index:10;
}
.nav-left{display:flex;align-items:center;gap:12px}
.logo-box{
  width:34px;height:34px;border-radius:9px;background:var(--brand-g);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#fff;
  box-shadow:0 3px 10px rgba(13,148,136,.35);
}
.nav-title{font-size:15px;font-weight:800;color:var(--dark);letter-spacing:-.2px}
.nav-right{display:flex;align-items:center;gap:10px}
.user-chip{
  display:flex;align-items:center;gap:8px;
  padding:5px 14px 5px 6px;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:20px;cursor:default;
}
.avatar{
  width:26px;height:26px;border-radius:50%;
  background:var(--brand-g);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;letter-spacing:.3px;
}
.chip-name{font-size:12px;font-weight:700;color:var(--text)}
.btn-nav{
  height:32px;padding:0 14px;border-radius:8px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Sora',sans-serif;transition:.15s;
}
.btn-admin{background:var(--brand-g);color:#fff;border:none;box-shadow:0 2px 8px rgba(13,148,136,.3)}
.btn-admin:hover{opacity:.9;transform:translateY(-1px)}
.btn-out{background:var(--danger-l);border:1.5px solid var(--danger-m);color:var(--danger)}
.btn-out:hover{background:var(--danger);color:#fff}

/* ── PAGE LAYOUT ── */
.page{
  display:flex;flex-direction:column;
  height:calc(100vh - 50px);overflow:hidden;
  padding:14px 32px 16px;gap:10px;
}

/* ── PAGE HEADER ── */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.page-hdr-left{}
.page-title{font-size:19px;font-weight:800;color:var(--dark);letter-spacing:-.3px}
.page-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}
.welcome-pill{
  display:flex;align-items:center;gap:8px;
  padding:6px 14px;
  background:linear-gradient(135deg,#f0fdfa,#ecfeff);
  border:1px solid #99f6e4;border-radius:20px;
  font-size:12px;font-weight:700;color:#0f766e;
}

/* ── CATEGORIES & CARDS ── */
.content{flex:1;min-height:0;overflow:hidden;position:relative}
.content-inner{transform-origin:top left;display:flex;flex-direction:row;gap:20px;align-items:flex-start}

.category-block{flex:1;min-width:0}
.cat-label{
  display:flex;align-items:center;gap:8px;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:2px solid var(--border);
}
.cat-dot{width:3px;height:15px;border-radius:2px;background:var(--brand-g)}
.cat-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted)}

.cards-row{display:flex;flex-direction:column;gap:14px}

.dash-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:16px;cursor:pointer;transition:.2s;
  box-shadow:var(--sh-s);display:flex;flex-direction:column;
  overflow:hidden;
}
.dash-card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 28px rgba(13,148,136,.14);
  border-color:#5eead4;
}

.card-top{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:13px}
.card-icon-wrap{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#f0fdfa,#ecfeff);
  display:flex;align-items:center;justify-content:center;font-size:21px;
  border:1px solid #d0fdf4;
}
.card-info{flex:1;min-width:0}
.card-tag{
  display:inline-block;font-size:9px;font-weight:800;
  text-transform:uppercase;letter-spacing:.8px;
  padding:3px 8px;border-radius:20px;margin-bottom:5px;
  color:#0f766e;background:#f0fdfa;border:1px solid #99f6e4;
}
.card-title{font-size:13px;font-weight:800;color:var(--dark);margin-bottom:4px;line-height:1.3}
.card-desc{font-size:11px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.card-foot{
  padding:8px 14px;border-top:1px solid #f1f5f9;
  display:flex;align-items:center;justify-content:space-between;
  background:#fafcfe;
}
.open-btn{
  height:27px;padding:0 14px;border:none;border-radius:7px;
  font-size:11px;font-weight:700;cursor:pointer;color:#fff;
  background:var(--brand-g);font-family:'Sora',sans-serif;
  transition:.15s;
}
.open-btn:hover{opacity:.9}
.card-arrow{font-size:11px;color:var(--muted2);font-weight:500}

/* ── EMPTY ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:200px;color:var(--muted);gap:10px;
}
.empty-icon{font-size:40px;opacity:.5}
.empty-text{font-size:14px;font-weight:700;color:var(--muted)}
.empty-sub{font-size:12px;color:var(--muted2)}

/* ── LOADING ── */
.loading-row{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:20px 0}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="logo-box">MB</div>
    <span class="nav-title">Margbooks Dashboard Portal</span>
  </div>
  <div class="nav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarEl">?</div>
      <span class="chip-name" id="userNameEl">Loading...</span>
    </div>
    <button class="btn-nav btn-admin" id="adminBtn" onclick="window.location.href='admin.html'" style="display:none">⚙ Admin</button>
    <button class="btn-nav btn-out" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-hdr">
    <div class="page-hdr-left">
      <div class="page-title">My Dashboards</div>
      <div class="page-sub" id="subtitleEl">Loading...</div>
    </div>
    <div class="welcome-pill" id="welcomePill" style="display:none">
      🌟 Welcome, <span id="welcomeName" style="margin-left:2px"></span>!
    </div>
  </div>

  <div class="content" id="contentArea">
    <div class="content-inner" id="contentInner">
      <div class="loading-row"><div class="spin"></div> Loading dashboards...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://xsxchyqhhyfvuxbofxna.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzeGNoeXFoaHlmdnV4Ym9meG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTMzNTAsImV4cCI6MjA5Njk4OTM1MH0.P4VYTv-fizFW7nknhP4h1BetBGJ6yLLD90lkUUYgt-4';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY, {auth:{persistSession:true,storage:window.sessionStorage}});

const ALL_DASHBOARDS = [
  {id:'tat-dashboard',      title:'Marg TAT Dashboard',      desc:'TAT analysis with InTAT/OutTAT breakdown and stage-wise pending tickets summary.',         icon:'📊', tag:'Analytics',  url:'marg_ticket_dashboard.html',  category:'Analytics'},
  {id:'support-dashboard',  title:'Support Dashboard',       desc:'Current status-wise ticket counts (all statuses) with disposition-wise breakdown, client & plan views.', icon:'🛟', tag:'Support',    url:'support_dashboard.html',      category:'Operations'},
  {id:'upcoming-dashboard', title:'Marg Upcoming Deadlines', desc:'Track tickets with deadlines in 1-7, 8-15, 16-30, 31-60 days with Dev & Bug categories.', icon:'📅', tag:'Planning',   url:'upcoming_timeline.html',      category:'Planning'},
  {id:'admin-activity',     title:'Admin Activity',          desc:'Client move to other server, control-room reset, remove caching and DB repair tools.',      icon:'🛠️', tag:'Admin',      url:'admin_activity.html',         category:'Admin'},
];

(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  const user = session.user;
  const {data:profile} = await sb.from('users').select('*').eq('id',user.id).single();
  const name = profile?.name || user.user_metadata?.name || user.user_metadata?.full_name || user.email.split('@')[0];
  const initials = name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('avatarEl').textContent   = initials;
  document.getElementById('userNameEl').textContent  = name;
  document.getElementById('welcomeName').textContent = name;
  document.getElementById('welcomePill').style.display = 'flex';

  const isAdmin = profile?.role === 'admin';
  const perms   = profile?.dashboards || [];

  if(isAdmin){
    document.getElementById('adminBtn').style.display='block';
    document.getElementById('subtitleEl').textContent='Admin access — all dashboards visible';
    renderDashboards(ALL_DASHBOARDS);
  } else if(perms.length){
    const allowed = ALL_DASHBOARDS.filter(d=>perms.includes(d.id));
    document.getElementById('subtitleEl').textContent=`${allowed.length} dashboard${allowed.length!==1?'s':''} available`;
    renderDashboards(allowed);
  } else {
    document.getElementById('subtitleEl').textContent='No dashboards assigned yet';
    document.getElementById('contentInner').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">🔒</div>
        <div class="empty-text">No dashboards yet</div>
        <div class="empty-sub">Contact your administrator to get access</div>
      </div>`;
  }
})();

function renderDashboards(list){
  const groups = {};
  list.forEach(d=>{if(!groups[d.category]) groups[d.category]=[];groups[d.category].push(d);});
  let html = '';
  for(const [cat, items] of Object.entries(groups)){
    html += `<div class="category-block">
      <div class="cat-label">
        <div class="cat-dot"></div>
        <span class="cat-name">${cat}</span>
      </div>
      <div class="cards-row">`;
    items.forEach(d=>{
      html += `<div class="dash-card" onclick="window.location.href='${d.url}'">
        <div class="card-top">
          <div class="card-icon-wrap">${d.icon}</div>
          <div class="card-info">
            <span class="card-tag">${d.tag}</span>
            <div class="card-title">${d.title}</div>
            <div class="card-desc">${d.desc}</div>
          </div>
        </div>
        <div class="card-foot">
          <button class="open-btn" onclick="event.stopPropagation();window.location.href='${d.url}'">Open →</button>
          <span class="card-arrow">Click to open ↗</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }
  document.getElementById('contentInner').innerHTML = html;
  fitContent();
}

function fitContent(){
  const outer = document.getElementById('contentArea');
  const inner = document.getElementById('contentInner');
  if(!outer || !inner) return;
  inner.style.transform = 'none';
  inner.style.width = '100%';
  const availH   = outer.clientHeight;
  const naturalH = inner.scrollHeight;
  if(availH > 0 && naturalH > availH){
    const scale = availH / naturalH;
    inner.style.transform = `scale(${scale})`;
    inner.style.width = (100 / scale) + '%';
  }
}

let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(fitContent, 120);
});

async function logout(){await sb.auth.signOut();window.location.href='index.html';}
</script>
</body>
</html>
