name: Fetch Tickets & Save to Supabase

on:
  schedule:
    - cron: '30 18 * * *'   # Raat 12:00 AM IST (18:30 UTC)
  workflow_dispatch:          # Manual run button

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # Parallel matrix runs ke liye kafi hai
    strategy:
      fail-fast: false      # Ek saal fail ho toh doosra chalta rahe
      matrix:
        include:
          - year: "2023"
            start: "2023-04-01"
            end: "2023-12-31"
          - year: "2024"
            start: "2024-01-01"
            end: "2024-12-31"
          - year: "2025"
            start: "2025-01-01"
            end: "2025-12-31"
          - year: "2026"
            start: "2026-01-01"
            end: "2026-12-31"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Fetch & Save
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          START_DATE_OVERRIDE: ${{ matrix.start }}
          END_DATE_OVERRIDE: ${{ matrix.end }}
          IS_MATRIX_RUN: "true"
        run: python3 .github/scripts/fetch_tickets.py
